<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Sign In | Echozy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <link rel="icon" type="image/png" href="../../assets/images/logo.png">
</head>
<body>
  <header class="navbar">
    <div class="logo-section">
      <img src="../../assets/images/logo.png" alt="Echozy Logo" class="logo" />
      <span class="logo-text">Echozy</span>
    </div>

    <div class="top-nav-shape">
      <nav class="nav-links">
        <a href="../../index.html">Home</a>
        <a href="../about.html">About Us</a>
        <a href="../choose-role.html" class="sign-in-link">Sign In</a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-section">
      <div class="auth-card">
        <div class="auth-card-left">
          <p class="auth-label">ADMIN ACCESS</p>
          <h1>Sign In as Admin</h1>
          <p class="auth-subtext">
            Admin can manage default phrases and vocabulary that will be synced
            across all patients in Echozy.
          </p>

          <form class="auth-form" id="adminSignInForm">
            <div class="form-group">
              <label for="admin-email">Email</label>
              <input type="email" id="admin-email" placeholder="Enter admin email" required />
            </div>

            <div class="form-group">
              <label for="admin-password">Password</label>
              <div class="password-input-wrapper">
                <input type="password" id="admin-password" placeholder="Enter password" required />
                <button type="button" class="password-toggle-btn" data-target="admin-password" aria-label="Show password"></button>
              </div>
            </div>

            <button type="submit" class="auth-submit-btn">Sign In</button>
          </form>

          <a href="../choose-role.html" class="back-link">← Back to role selection</a>
        </div>

        <div class="auth-card-right">
          <div class="auth-image-card provider-image-card">
            <img src="../../assets/images/admin.png" alt="Admin managing Echozy content" />
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Echozy. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../assets/js/auth-flow.js"></script>
</body>
</html>
