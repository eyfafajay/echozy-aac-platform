<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caregiver Sign Up | Echozy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css" />
</head>
<body>
  <!-- Navbar -->
  <header class="navbar">
    <div class="logo-section">
      <img src="../../assets/images/logo.png" alt="Echozy Logo" class="logo" />
      <span class="logo-text">Echozy</span>
    </div>

    <div class="top-nav-shape">
      <nav class="nav-links">
        <a href="../../index.html">Home</a>
        <a href="../about.html">About Us</a>
        <a href="../choose-role.html" class="sign-in-link">Sign In</a>
      </nav>
    </div>
  </header>

  <!-- Sign Up Main -->
  <main class="auth-page">
    <section class="auth-section">
      <div class="auth-card">
        <div class="auth-card-left">
          <p class="auth-label">CAREGIVER PORTAL</p>
          <h1>Create Your Account</h1>
          <p class="auth-subtext">
            Sign up to support patients through communication tools, phrase
            management, and vocabulary guidance in Echozy.
          </p>

          <form class="auth-form" id="caregiverSignUpForm">
            <div class="form-group">
              <label for="caregiver-fullname">Full Name</label>
              <input type="text" id="caregiver-fullname" placeholder="Enter your full name" />
            </div>

            <div class="form-group">
              <label for="caregiver-email">Email</label>
              <input type="email" id="caregiver-email" placeholder="Enter your email" />
            </div>

            <div class="form-group">
              <label for="caregiver-password">Password</label>
              <input type="password" id="caregiver-password" placeholder="Create a password" />
            </div>

            <div class="form-group">
              <label for="caregiver-confirm-password">Confirm Password</label>
              <input type="password" id="caregiver-confirm-password" placeholder="Re-enter your password" />
            </div>

            <button type="submit" class="auth-submit-btn">Sign Up</button>
          </form>

          <p class="auth-bottom-text">
            Already have an account?
            <a href="caregiver-signin.html">Sign In</a>
          </p>

          <a href="../choose-role.html" class="back-link">← Back to Role Selection</a>
        </div>

        <div class="auth-card-right">
          <div class="auth-image-card">
            <img src="../../assets/images/caregiver/hero6.png" alt="Caregiver registration" />
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 Echozy. All rights reserved.</p>
  </footer>

  <script src="../../assets/js/auth-flow.js"></script>
</body>
</html>
